apiVersion: v1
kind: Service
metadata:
  name: wanshitong-api-service
spec:
  type: ClusterIP
  selector:
    app: wanshitong-api
  ports:
    - port: 80
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wanshitong-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wanshitong-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: wanshitong-api
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command: ['sh', '-c', 'until nc -z wanshitong-postgres-service 5432; do echo "Waiting for postgres..."; sleep 2; done']
        - name: run-migrations
          image: <IMAGE_NAME>
          imagePullPolicy: Never
          command: ['node', 'dist/db/migrate.js']
          envFrom:
            - secretRef:
                name: wanshitong-secret
      containers:
        - name: wanshitong-api
          image: <IMAGE_NAME>
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: wanshitong-secret
      terminationGracePeriodSeconds: 30
