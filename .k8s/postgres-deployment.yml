apiVersion: v1
kind: PersistentVolume
metadata:
  name: wanshitong-postgres-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: hostpath
  hostPath:
    path: /srv/k8s-data/wanshitong/postgres
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wanshitong-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: hostpath
  volumeName: wanshitong-postgres-pv
---
apiVersion: v1
kind: Service
metadata:
  name: wanshitong-postgres-service
spec:
  type: ClusterIP
  selector:
    app: wanshitong-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wanshitong-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wanshitong-postgres
  template:
    metadata:
      labels:
        app: wanshitong-postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: wanshitong-postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: wanshitong-postgres-pvc
