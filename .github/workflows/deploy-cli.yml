# Note: ANTHROPIC_API_KEY must be configured in k8s secrets for the API server
# to enable embedding and summarization features used by the search endpoint.

name: Deploy CLI

on:
  push:
    branches: [main]
    paths:
      - 'packages/cli/**'

jobs:
  deploy-cli:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install -g corepack && corepack enable

      - run: corepack install

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @wanshitong/cli build

      - run: pnpm --filter @wanshitong/cli build:binary

      - name: Upload CLI binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: wst-cli
          path: packages/cli/dist/wst-bundle.cjs

