# Note: ANTHROPIC_API_KEY must be configured in k8s secrets for the API server
# to enable embedding and summarization features used by the search endpoint.
#
# Required secrets:
#   HOMEBREW_TAP_TOKEN - a PAT with repo scope for tylersmith-art/homebrew-wst

name: Deploy CLI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/cli/**'

jobs:
  deploy-cli:
    runs-on: [self-hosted, linux, deploy]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install -g corepack && corepack enable

      - run: corepack install

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @wanshitong/cli build

      - run: pnpm --filter @wanshitong/cli build:binary

      - name: Read CLI version
        id: version
        run: |
          CLI_VERSION=$(node -p 'require("./packages/cli/package.json").version')
          echo "version=${CLI_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package tarball
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p wst-${VERSION}
          cp packages/cli/dist/wst-bundle.cjs wst-${VERSION}/
          tar czf wst-${VERSION}.tar.gz wst-${VERSION}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          gh release delete "v${VERSION}" --yes 2>/dev/null || true
          gh release create "v${VERSION}" \
            "wst-${VERSION}.tar.gz" \
            --title "v${VERSION}" \
            --notes "CLI release v${VERSION}" \
            --latest

      - name: Upload CLI binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: wst-cli
          path: packages/cli/dist/wst-bundle.cjs

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping formula update"
            exit 0
          fi

          VERSION=${{ steps.version.outputs.version }}
          SHA=$(shasum -a 256 "wst-${VERSION}.tar.gz" | cut -d' ' -f1)
          echo "Version: ${VERSION}, SHA: ${SHA}"

          FORMULA_SHA=$(gh api repos/tylersmith-art/homebrew-wst/contents/Formula/wst.rb --jq '.sha')

          FORMULA=$(cat <<RUBY
          class Wst < Formula
            desc "Wan Shi Tong CLI - Architecture knowledge search"
            homepage "https://github.com/tylersmith-art/wanshitong"
            version "${VERSION}"
            url "https://github.com/tylersmith-art/wanshitong/releases/download/v#{version}/wst-#{version}.tar.gz"
            sha256 "${SHA}"
            license "MIT"

            depends_on "node"

            def install
              bin.install "wst-bundle.cjs" => "wst"
            end
          end
          RUBY
          )

          gh api repos/tylersmith-art/homebrew-wst/contents/Formula/wst.rb \
            -X PUT \
            -f message="chore: update wst to v${VERSION}" \
            -f content="$(echo "$FORMULA" | base64)" \
            -f sha="$FORMULA_SHA"
