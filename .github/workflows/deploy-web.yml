name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/web/**"
      - "packages/hooks/**"
      - "packages/shared/**"

jobs:
  deploy:
    runs-on: [self-hosted, linux, deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          echo "REPO_NAME=$(basename $GITHUB_REPOSITORY)" >> $GITHUB_ENV
          echo "GIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Load env for Vite build args
        run: |
          ENV_FILE="/home/tylersmith/envs/${{ env.REPO_NAME }}.env"
          if [ ! -f "$ENV_FILE" ]; then
            echo "ERROR: $ENV_FILE not found. Run init.sh first."
            exit 1
          fi
          grep "^VITE_" "$ENV_FILE" >> $GITHUB_ENV

      - name: Build Web Docker image
        run: |
          docker build \
            -f packages/web/Dockerfile \
            --build-arg VITE_AUTH0_DOMAIN=${{ env.VITE_AUTH0_DOMAIN }} \
            --build-arg VITE_AUTH0_CLIENT_ID=${{ env.VITE_AUTH0_CLIENT_ID }} \
            --build-arg VITE_AUTH0_AUDIENCE=${{ env.VITE_AUTH0_AUDIENCE }} \
            -t ${{ env.REPO_NAME }}-ui:${{ env.GIT_SHA }} \
            .

      - name: Load image into k3s
        run: |
          docker save ${{ env.REPO_NAME }}-ui:${{ env.GIT_SHA }} | k3s ctr images import -

      - name: Deploy to Kubernetes
        run: |
          sed -e "s|wanshitong|${{ env.REPO_NAME }}|g" \
              -e "s|<IMAGE_NAME>|${{ env.REPO_NAME }}-ui:${{ env.GIT_SHA }}|g" \
              .k8s/web-deployment.yml | kubectl apply -f -

      - name: Verify rollout
        run: kubectl rollout status deployment/${{ env.REPO_NAME }}-ui --timeout=120s
