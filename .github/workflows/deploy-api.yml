name: Deploy API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "packages/api/**"
      - "packages/shared/**"

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          echo "REPO_NAME=$(basename $GITHUB_REPOSITORY)" >> $GITHUB_ENV
          echo "GIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build API Docker image
        run: |
          docker build \
            -f packages/api/Dockerfile \
            -t ${{ env.REPO_NAME }}-api:${{ env.GIT_SHA }} \
            .

      - name: Generate K8s secrets
        run: |
          ENV_FILE="/Users/tylersmith/envs/${{ env.REPO_NAME }}.env"
          if [ ! -f "$ENV_FILE" ]; then
            echo "ERROR: $ENV_FILE not found. Run init.sh first."
            exit 1
          fi
          kubectl delete secret ${{ env.REPO_NAME }}-secret --ignore-not-found
          kubectl create secret generic ${{ env.REPO_NAME }}-secret \
            --from-env-file="$ENV_FILE"

      - name: Deploy to Kubernetes
        run: |
          sed -e "s|<REPO_NAME>|${{ env.REPO_NAME }}|g" \
              -e "s|<IMAGE_NAME>|${{ env.REPO_NAME }}-api:${{ env.GIT_SHA }}|g" \
              .k8s/api-deployment.yml | kubectl apply -f -

      - name: Verify rollout
        run: kubectl rollout status deployment/${{ env.REPO_NAME }}-api --timeout=120s
